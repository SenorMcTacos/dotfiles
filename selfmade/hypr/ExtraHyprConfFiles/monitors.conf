# See https://wiki.hyprland.org/Configuring/Monitors/
# monitor= DP-3, 1920x1080@165, 1920x0, 1
# monitor= HDMI-A-1, 1920x1080@60, 0x0, 1
# monitor = screen_name, widthxheight@hz, XxY,
# This setup mirrors the res of the laptop
#monitor = , highrr ,auto, auto
#monitor= HDMI-A-1 , preferred, auto, 2, mirror, eDP-1 # mirrors the main screen

# This setup will be good for lower res
#monitor = eDP-1, 1920x1200@120, auto, 1

# This is good for projecting onto screens, but makes the screen the main screen. 
# Will need to uncomment the above settings to restore
monitor = HDMI-A-1, 3840x2160@60 ,auto, auto
monitor= eDP-1, preferred, auto, 2, mirror, HDMI-A-1 # mirrors the main screen

