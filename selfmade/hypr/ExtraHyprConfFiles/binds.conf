
###################
### KEYBINDINGS ###
###################

# USE uwsm app -- because were starting stuff through uwsm


#See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, T, exec, uwsm app -- $terminal
bind = $mainMod, Q, killactive,
bind = alt, f4, killactive,
# bind = $mainMod, delete, exit, # old exit
bind = $mainMod, delete, exec, uwsm stop
bind = $mainMod, E, exec, uwsm app -- $fileManager
bind = $mainMod, R, exec, uwsm app -- $menu
bind = $mainMod, P, exec, uwsm app -- grim -g "$(slurp)" - | swappy -f -
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, C, exec, uwsm app -- code

# Waybar crap
bind = $mainMod + CTRL + ALT, W, exec, killall waybar || uwsm app -s s -- waybar

# Fullscreen + Floating Options
bind = $mainMod, W, togglefloating
bind = $mainMod, F, fullscreen

# Zoom/Magnifier
#bind = $mainMod + SHIFT, mouse_down, exec, hyprctl keyword cursor:zoom_factor 2
#bind = $mainMod + SHIFT, mouse_up, exec, hyprctl keyword cursor:zoom_factor 1
# Zoom In, then Zoom Out at scales of .5
# https://www.reddit.com/r/hyprland/comments/17wworu/screen_magnifier_solutions_for_hyprland/
bind = $mainMod SHIFT, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.5}")
bind = $mainMod SHIFT, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.5}")

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll, or with arrows
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod, mouse_up, workspace, e+1
bind = $mainMod, right, workspace, e+1
bind = $mainMod, left, workspace, e-1
bind = $mainMod, h, workspace, e-1
bind = $mainMod, l, workspace, e+1
bind = ALT, Tab, cyclenext, # bind below required for alt tab switching
bind = ALT, Tab, bringactivetotop, # need bind above for alt tab switching

# Scroll through all workspaces, even non existing, with mainMod + scroll + shift, or with arrows
bind = $mainMod + CONTROL, mouse_down, workspace, r-1
bind = $mainMod + CONTROL, mouse_up, workspace, r+1
bind = $mainMod + CONTROL, right, workspace, r+1
bind = $mainMod + CONTROL, left, workspace, r-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod + CTRL, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, uwsm app -- wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, uwsm app --wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
# bindel = $mainMod, F6, exec, brightnessctl s 5%+
# bindel = $mainMod, F5, exec, brightnessctl s 4%-
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 5%+ # Vivobook wanted XF86MonBrightnessUp not non Mon
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 4%-

# Rofi keybinds
# pkill = pattern kill, -x = exact match
# not using uwsm app because this thing is open for such a short amount of time, avoid python load overhead
bind = $mainMod, A, exec, pkill -x rofi || rofi -show drun -run-command "uwsm app -- {cmd}"
# bind = $mainMod, A, exec, pkill -x rofi ||rofi -show drun # show apps based on desktop files (ez apps), old
bind = $mainMod + SHIFT, A, exec, pkill -x rofi || uwsm app -- rofi -show window -run-command "uwsm app -- {cmd}"  # pull up active windows search bar
bind = $mainMod + SHIFT + CONTROL, A, exec, uwsm app -- pkill -x rofi || uwsm app -- rofi -show run -run-command "uwsm app -- {cmd}" # pull up all exe. stuff


# Requires playerctl
bindl = , XF86AudioNext, exec, uwsm app -- playerctl next
bindl = , XF86AudioPause, exec, uwsm app --playerctl play-pause
bindl = , XF86AudioPlay, exec, uwsm app -- playerctl play-pause
bindl = , XF86AudioPrev, exec, uwsm app -- playerctl previous
