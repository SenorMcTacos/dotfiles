
# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hyprland.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################


# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

#
# ALL SCRIPTS GO THRU THIS PATH
#
$scrPath = ~/.config/hypr/ExtraHyprConfFiles/HyprScripts # set scripts path


cursor {

        no_hardware_cursors = true; // Fix bug with games, i think the cursor would disappear or overlay weird, nvidia

}

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
# monitor=,preferred,auto,auto
source = ~/.config/hypr/ExtraHyprConfFiles/monitors.conf

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
#
# EXEC ONCE!!! Now uses uwsm to start
#

# -s = slice placement, b = background, a = app, s = session
# app (a) = default, for normal ass apps
# background (b), for low- priority non-interactive bg tasks
# session (s), high-priority, interactive bg tasks
# YOU DON'T USE UWSM FOR systemctl --user starts?
exec-once = uwsm app -s s -- dunst # hnotifications
exec-once = uwsm app -- firefox
exec-once = systemctl --user enable --now waybar.service
exec-once = uwsm app -- spotify-launcher
exec-once = uwsm app -s b -- dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # needed for screen sharing
# exec-once = uwsm app -s s -- /usr/lib/polkit-kde-authentication-agent-1 # Needed to acceess windows partition by running the authentication agent
exec-once = systemctl --user start hyprpolkitagent # polkit authentication daemon for requested elevated priovileges
exec-once = systemctl --user enable syncthing.service
exec-once = systemctl --user start ufw.service


# DO NOT START THESE SERVICES THIS WAY, SIMPLY RUNNING THE COMMAND SHOULD MAKE IT PERMANENT
# REQUIRED TO GET STUFF WORKING
# exec-once = systemctl --user enable bluetooth.service
# systemctl --user enable pipewire
# systemctl --user enable pipewire-pulse
# systemctl --user enable wireplumber
# systemctl --user enable --now hyprpaper.service

